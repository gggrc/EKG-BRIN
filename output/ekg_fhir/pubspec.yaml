name: ekg_fhir
description: "EKG-BRIN — Sistem End-to-End EKG berbasis HL7 FHIR untuk SATUSEHAT"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^14.8.1

  # State Management
  provider: ^6.1.2

  # HTTP Client
  dio: ^5.8.0+1

  # Local Storage
  shared_preferences: ^2.3.5

  # Charts & Visualization
  fl_chart: ^0.70.2

  # Fonts
  google_fonts: ^6.2.1

  # File Picker (upload EKG)
  file_picker: ^8.3.7

  # Date/Time formatting
  intl: ^0.19.0

  # Icons (additional)
  flutter_svg: ^2.0.17

  # Animations
  flutter_animate: ^4.5.0

  # UUID generation
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
