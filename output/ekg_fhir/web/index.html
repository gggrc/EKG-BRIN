<!DOCTYPE html>
<html lang="id">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <title>EKG-BRIN — Sistem EKG Digital Nasional</title>
  <meta name="description" content="Platform end-to-end untuk digitalisasi, transformasi, dan integrasi data EKG (6-lead & 12-lead) berbasis HL7 FHIR ke SATUSEHAT Kemenkes RI. Dikembangkan oleh BRIN.">
  <meta name="keywords" content="EKG, ECG, FHIR, SATUSEHAT, kardiologi, rekam medis, HL7, BRIN, Indonesia">
  <meta name="author" content="BRIN — Badan Riset dan Inovasi Nasional">

  <!-- PWA / iOS meta tags -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EKG-BRIN">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Theme color -->
  <meta name="theme-color" content="#0EA5E9">
  <meta name="msapplication-TileColor" content="#0F172A">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- Web App Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Open Graph -->
  <meta property="og:title" content="EKG-BRIN — Sistem EKG Digital Nasional">
  <meta property="og:description" content="Platform HL7 FHIR untuk digitalisasi dan integrasi data EKG ke SATUSEHAT Kemenkes RI">
  <meta property="og:type" content="website">

  <style>
    /* Loading screen while Flutter initializes */
    body {
      margin: 0;
      padding: 0;
      background-color: #0F172A;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
    }

    #loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .loading-logo {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #0EA5E9, #14B8A6);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #1E293B;
      border-top-color: #0EA5E9;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      color: #94A3B8;
      font-size: 14px;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="loading-logo">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 12h3l2-5 4 10 2-7 2 5 1-3h4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="loading-spinner"></div>
    <div class="loading-text">EKG-BRIN sedang dimuat...</div>
  </div>

  <script>
    // Hide loading screen when Flutter is ready
    window.addEventListener('flutter-first-frame', function() {
      var loading = document.getElementById('loading-screen');
      if (loading) {
        loading.style.opacity = '0';
        loading.style.transition = 'opacity 0.3s ease';
        setTimeout(function() { loading.remove(); }, 300);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
